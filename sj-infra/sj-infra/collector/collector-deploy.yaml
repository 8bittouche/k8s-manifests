apiVersion: apps/v1
kind: Deployment
metadata:
  name: sj-collector
  namespace: sj-infra
  labels:
    app: sj-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sj-collector
  template:
    metadata:
      labels:
        app: sj-collector
    spec:
      containers:
      - name: sj-collector
        image: harbor.192.168.50.200.sslip.io/sj-harbor/sj-collector:v1
        # [전문가의 팁] 환경변수를 통해 DB 접속 정보를 주입합니다.
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: INFLUXDB_URL
          value: "http://influxdb-service:8086" # K8s 내부 서비스 이름 사용
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
